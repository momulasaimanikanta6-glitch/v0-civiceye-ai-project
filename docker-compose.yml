services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env

  frontend-citizen:
    build:
      context: ./frontend/citizen-app
    ports:
      - "5173:5173"
    depends_on:
      - backend

  frontend-admin:
    build:
      context: ./frontend/admin-dashboard
    ports:
      - "5174:5174"
    depends_on:
      - backend

